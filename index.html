<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lista Atreide — Infinity</title>
  <style>
    /* ─── Reset & Base ─────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #0d0f14;
      --surface:    #161b26;
      --border:     #2a3145;
      --accent:     #c8a84b;
      --accent2:    #5b9bd5;
      --text:       #d6dce8;
      --text-dim:   #7a8499;
      --tag-bg:     #1e2535;
      --tag-hover:  #2d3a55;
      --red:        #c0392b;
      --green:      #27ae60;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 14px;
      line-height: 1.5;
    }

    /* ─── Header ───────────────────────────────────────────────────── */
    header {
      background: linear-gradient(135deg, #0d0f14 0%, #1a2035 100%);
      border-bottom: 2px solid var(--accent);
      padding: 1.5rem 2rem;
      display: flex;
      align-items: center;
      gap: 1.5rem;
    }

    header .logo {
      font-size: 2rem;
      font-weight: 900;
      letter-spacing: 0.12em;
      color: var(--accent);
      text-transform: uppercase;
    }

    header .subtitle {
      color: var(--text-dim);
      font-size: 0.85rem;
    }

    header .points {
      margin-left: auto;
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--accent);
    }

    /* ─── Main layout ──────────────────────────────────────────────── */
    main {
      max-width: 1400px;
      margin: 0 auto;
      padding: 2rem 1.5rem 4rem;
    }

    /* ─── Group header ─────────────────────────────────────────────── */
    .group-header {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin: 2.5rem 0 1rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    .group-header h2 {
      font-size: 1rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--accent2);
    }

    .order-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      background: var(--tag-bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 0.1rem 0.5rem;
      font-size: 0.75rem;
      color: var(--text-dim);
    }

    .order-badge .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--accent2);
      display: inline-block;
    }

    /* ─── Unit Grid ────────────────────────────────────────────────── */
    .unit-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 1rem;
    }

    /* ─── Unit Card ────────────────────────────────────────────────── */
    .unit-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      transition: border-color 0.2s;
    }

    .unit-card:hover {
      border-color: var(--accent);
    }

    /* Card top stripe by troop type */
    .unit-card.troop-IL  { border-top: 3px solid #7a8499; }
    .unit-card.troop-IM  { border-top: 3px solid #5b9bd5; }
    .unit-card.troop-IP  { border-top: 3px solid var(--accent); }
    .unit-card.troop-BAT { border-top: 3px solid #9b59b6; }
    .unit-card.troop-WB  { border-top: 3px solid var(--red); }

    .card-header {
      padding: 0.75rem 1rem 0.5rem;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }

    .unit-name {
      font-size: 1rem;
      font-weight: 700;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      cursor: pointer;
      display: inline-block;
    }

    .unit-name:hover {
      text-decoration: underline;
      opacity: 0.85;
    }

    /* ─── Miniature image modal ────────────────────────────────────── */
    #modal-img-wrap {
      text-align: center;
      margin-top: 1rem;
    }

    #modal-img-wrap img {
      max-width: 100%;
      max-height: 420px;
      border-radius: 6px;
      border: 1px solid var(--border);
      object-fit: contain;
      background: #0d0f14;
    }

    #modal-img-wrap .img-missing {
      padding: 3rem 1rem;
      color: var(--text-dim);
      font-size: 0.85rem;
      border: 1px dashed var(--border);
      border-radius: 6px;
    }

    .unit-role {
      font-size: 0.75rem;
      color: var(--text-dim);
      margin-top: 0.15rem;
    }

    .troop-type-badge {
      font-size: 0.7rem;
      font-weight: 700;
      padding: 0.2rem 0.5rem;
      border-radius: 4px;
      background: var(--tag-bg);
      border: 1px solid var(--border);
      color: var(--text-dim);
      white-space: nowrap;
    }

    /* ─── Stats Row ────────────────────────────────────────────────── */
    .stats-row {
      display: flex;
      gap: 0;
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
    }

    .stat {
      flex: 1;
      text-align: center;
      padding: 0.35rem 0.2rem;
      border-right: 1px solid var(--border);
    }

    .stat:last-child { border-right: none; }

    .stat-label {
      font-size: 0.6rem;
      font-weight: 700;
      text-transform: uppercase;
      color: var(--text-dim);
      display: block;
      cursor: pointer;
      transition: color 0.15s;
    }

    .stat-label:hover { color: var(--accent); }

    .stat-value {
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--text);
    }

    .stat.highlight .stat-value { color: var(--accent2); }

    /* ─── Weapons ──────────────────────────────────────────────────── */
    .card-section {
      padding: 0.6rem 1rem;
    }

    .section-label {
      font-size: 0.65rem;
      text-transform: uppercase;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: var(--text-dim);
      margin-bottom: 0.3rem;
    }

    .weapons-list {
      font-size: 0.8rem;
      color: var(--text);
      line-height: 1.6;
    }

    .weapon-tag {
      display: inline-block;
      background: #1a2535;
      border: 1px solid #2d3a55;
      border-radius: 3px;
      padding: 0 0.35rem;
      margin: 0.1rem 0.1rem 0.1rem 0;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }

    .weapon-tag:hover {
      background: #253550;
      border-color: var(--accent2);
      color: var(--accent2);
    }

    /* ─── Equipment ────────────────────────────────────────────────── */
    .equip-list {
      display: flex;
      flex-wrap: wrap;
      gap: 0.3rem;
    }

    .equip-tag {
      font-size: 0.72rem;
      background: #1e2a1e;
      border: 1px solid #2d4530;
      border-radius: 3px;
      padding: 0.1rem 0.4rem;
      color: #6dbf7e;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      user-select: none;
    }

    .equip-tag:hover {
      background: #243524;
      border-color: #6dbf7e;
    }

    /* ─── Skills ───────────────────────────────────────────────────── */
    .skills-list {
      display: flex;
      flex-wrap: wrap;
      gap: 0.3rem;
    }

    .skill-tag {
      font-size: 0.72rem;
      background: var(--tag-bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 0.15rem 0.5rem;
      cursor: pointer;
      color: var(--text);
      transition: background 0.15s, border-color 0.15s, color 0.15s;
      user-select: none;
    }

    .skill-tag:hover {
      background: var(--tag-hover);
      border-color: var(--accent);
      color: var(--accent);
    }

    /* ─── Wound tracker ────────────────────────────────────────────── */
    .vita-tracker {
      display: flex;
      gap: 0.4rem;
      align-items: center;
      margin-top: 0.4rem;
    }

    .vita-box {
      width: 22px; height: 22px;
      border: 2px solid var(--accent);
      border-radius: 3px;
      cursor: pointer;
      background: transparent;
      transition: background 0.15s;
    }

    .vita-box.used { background: var(--accent); }
    .vita-box.dead { background: var(--red); border-color: var(--red); }

    .vita-label {
      font-size: 0.7rem;
      color: var(--text-dim);
    }

    /* Status badges */
    .status-row {
      display: flex;
      gap: 0.3rem;
      flex-wrap: wrap;
      margin-top: 0.4rem;
    }

    .status-badge {
      font-size: 0.65rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      padding: 0.1rem 0.45rem;
      border-radius: 3px;
      border: 1px solid;
    }

    .status-badge.active   { background: #1a3a1a; border-color: var(--green);  color: var(--green);  }
    .status-badge.inactive { background: #2a1a1a; border-color: var(--red);    color: var(--red);    }
    .status-badge.hidden   { background: #1a1a2a; border-color: var(--accent2); color: var(--accent2); }

    /* ─── Modal overlay ────────────────────────────────────────────── */
    #modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }

    #modal-overlay.open { display: flex; }

    #modal {
      background: var(--surface);
      border: 1px solid var(--accent);
      border-radius: 10px;
      max-width: 480px;
      width: 90%;
      padding: 1.5rem;
      position: relative;
      animation: fadeIn 0.15s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    #modal-close {
      position: absolute;
      top: 0.75rem; right: 1rem;
      background: none;
      border: none;
      color: var(--text-dim);
      font-size: 1.3rem;
      cursor: pointer;
      line-height: 1;
    }

    #modal-close:hover { color: var(--accent); }

    #modal-title {
      font-size: 1rem;
      font-weight: 700;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 0.75rem;
      padding-right: 1.5rem;
    }

    #modal-body {
      font-size: 0.85rem;
      color: var(--text);
      line-height: 1.7;
    }

    #modal-body .meta {
      font-size: 0.75rem;
      color: var(--text-dim);
      margin-bottom: 0.5rem;
    }

    /* ─── Weapon modal ─────────────────────────────────────────────── */
    .weapon-stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0.5rem;
      margin-top: 0.75rem;
      padding-top: 0.75rem;
      border-top: 1px solid var(--border);
    }

    .weapon-stat { text-align: center; }
    .weapon-stat-label { font-size: 0.65rem; color: var(--text-dim); display: block; }
    .weapon-stat-val   { font-size: 0.9rem; font-weight: 700; color: var(--accent2); }

    /* ─── Propiedad tags ────────────────────────────────────────────── */
    .prop-tag {
      display: inline-block;
      background: #1e1a35;
      border: 1px solid #3d3060;
      border-radius: 3px;
      padding: 0.1rem 0.4rem;
      margin: 0.1rem 0.05rem;
      cursor: pointer;
      color: #b89de8;
      font-size: 0.72rem;
      transition: background 0.15s, border-color 0.15s;
      user-select: none;
    }
    .prop-tag:hover { background: #2d2850; border-color: #b89de8; }

    /* ─── Munición tags ─────────────────────────────────────────────── */
    .mun-tag {
      display: inline-block;
      background: #2a1a20;
      border: 1px solid #5a2535;
      border-radius: 3px;
      padding: 0.1rem 0.4rem;
      margin: 0.05rem;
      cursor: pointer;
      color: #e89daa;
      font-size: 0.75rem;
      font-weight: 700;
      transition: background 0.15s, border-color 0.15s;
      user-select: none;
    }
    .mun-tag:hover { background: #3a1a25; border-color: #e89daa; }

    /* ─── Weapon table page ────────────────────────────────────────── */
    #weapons-section {
      margin-top: 3rem;
    }

    #weapons-section h2 {
      font-size: 1rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--accent2);
      border-bottom: 1px solid var(--border);
      padding-bottom: 0.5rem;
      margin-bottom: 1rem;
    }

    .weapon-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.78rem;
    }

    .weapon-table th {
      background: var(--tag-bg);
      color: var(--text-dim);
      font-weight: 700;
      text-transform: uppercase;
      font-size: 0.65rem;
      letter-spacing: 0.06em;
      padding: 0.5rem 0.6rem;
      text-align: left;
      border-bottom: 2px solid var(--border);
    }

    .weapon-table td {
      padding: 0.45rem 0.6rem;
      border-bottom: 1px solid var(--border);
      vertical-align: top;
    }

    .weapon-table tr:hover td { background: var(--tag-bg); }

    .weapon-table td:first-child { font-weight: 600; color: var(--text); }

    /* ─── Footer ───────────────────────────────────────────────────── */
    footer {
      text-align: center;
      padding: 1.5rem;
      color: var(--text-dim);
      font-size: 0.75rem;
      border-top: 1px solid var(--border);
      margin-top: 3rem;
    }

    /* ─── Responsive ───────────────────────────────────────────────── */
    @media (max-width: 700px) {
      /* Header compacto */
      header { padding: 0.75rem 1rem; gap: 0.4rem; }
      header .logo { font-size: 1.4rem; }
      header .subtitle { font-size: 0.75rem; }
      header .points { margin-left: auto; font-size: 1rem; }

      /* Layout */
      main { padding: 1rem 0.75rem 4rem; }
      .unit-grid { grid-template-columns: 1fr; }
      .group-header { flex-wrap: wrap; gap: 0.4rem; }

      /* Stats: etiquetas más legibles */
      .stat-label { font-size: 0.68rem; }
      .stat-value { font-size: 0.9rem; }
      .stat       { padding: 0.4rem 0.1rem; }

      /* Tags: área táctil más grande para dedos */
      .skill-tag, .equip-tag {
        font-size: 0.8rem;
        padding: 0.35rem 0.6rem;
        margin: 0.15rem 0.1rem;
      }
      .weapon-tag {
        font-size: 0.82rem;
        padding: 0.25rem 0.45rem;
        margin: 0.15rem 0.1rem 0.15rem 0;
      }

      /* Modal: scroll si el contenido es largo */
      #modal {
        max-height: 88vh;
        display: flex;
        flex-direction: column;
        padding: 1.2rem;
      }
      #modal-body {
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
        flex: 1;
        font-size: 0.9rem;
        padding-right: 0.25rem;
      }
      #modal-title { font-size: 0.95rem; }
      #modal-close { font-size: 1.5rem; padding: 0.25rem 0.5rem; top: 0.5rem; right: 0.5rem; }

      /* Tabla de armamento: fuente más pequeña, celdas más ajustadas */
      .weapon-table { font-size: 0.7rem; }
      .weapon-table th, .weapon-table td { padding: 0.4rem 0.4rem; }

      /* Orden badges en grupos */
      .order-badge { font-size: 0.7rem; }

      /* Vita boxes más grandes para tocar */
      .vita-box { width: 28px; height: 28px; }

      /* Prop y mun tags más fáciles de pulsar */
      .prop-tag, .mun-tag {
        font-size: 0.78rem;
        padding: 0.3rem 0.5rem;
        margin: 0.15rem 0.05rem;
      }

      /* Section cards más compactas */
      .card-section { padding: 0.5rem 0.75rem; }
      .card-header { padding: 0.6rem 0.75rem 0.4rem; }
    }
  </style>
</head>
<body>

<!-- ═══════════════════════════════════════════════════════════════════
     HEADER
════════════════════════════════════════════════════════════════════ -->
<header>
  <div>
    <div class="logo">Lista Atreide</div>
    <div class="subtitle">Shindenbutai · Pin: B1341-PAtreide</div>
  </div>
  <div class="points">300 / 3 SWC</div>
</header>

<!-- ═══════════════════════════════════════════════════════════════════
     MAIN
════════════════════════════════════════════════════════════════════ -->
<main>

  <!-- ── GRUPO 1 ────────────────────────────────────────────────── -->
  <div class="group-header">
    <h2>Grupo 1</h2>
    <span class="order-badge"><span class="dot"></span>9 órdenes regulares</span>
    <span class="order-badge" style="--dot-color:#c8a84b;"><span class="dot" style="background:var(--accent)"></span>1 orden de teniente</span>
    <span class="order-badge"><span class="dot" style="background:#7a8499"></span>1 irregular</span>
  </div>

  <div class="unit-grid" id="group1-grid"></div>

  <!-- ── GRUPO 2 ────────────────────────────────────────────────── -->
  <div class="group-header" style="margin-top:2.5rem">
    <h2>Grupo 2</h2>
    <span class="order-badge"><span class="dot"></span>3 órdenes regulares</span>
  </div>

  <div class="unit-grid" id="group2-grid"></div>

  <!-- ── TABLA DE ARMAMENTO ─────────────────────────────────────── -->
  <section id="weapons-section">
    <h2>Tabla de Armamento</h2>
    <div style="overflow-x:auto;">
      <table class="weapon-table" id="weapon-table"></table>
    </div>
  </section>

</main>

<!-- ═══════════════════════════════════════════════════════════════════
     MODAL
════════════════════════════════════════════════════════════════════ -->
<div id="modal-overlay">
  <div id="modal">
    <button id="modal-close" aria-label="Cerrar">✕</button>
    <div id="modal-title"></div>
    <div id="modal-body"></div>
  </div>
</div>

<footer>Infinity — Lista Atreide · 25 / 04 / 2026</footer>

<!-- ═══════════════════════════════════════════════════════════════════
     DATA & LOGIC
════════════════════════════════════════════════════════════════════ -->
<script>
// ─── Equipment database ────────────────────────────────────────────────
// ─── Stats database ────────────────────────────────────────────────────
const STATS = {
  "MOV": {
    nombre: "Movimiento (MOV)",
    desc: "Indica cuántos centímetros puede moverse la tropa por activación. Se muestra como dos valores (ej. 10-10): el primero es el MOV del primer Short Move y el segundo es del segundo Short Move dentro de la misma Orden. Una Orden de Mover gasta los dos valores en secuencia."
  },
  "CC": {
    nombre: "Combate Cuerpo a Cuerpo (CC)",
    desc: "Habilidad de combate a corta distancia. Se usa como base para los ataques en Cuerpo a Cuerpo (melee) y también como defensa cuando la tropa es atacada en CC. Valores más altos indican mayor destreza marcial. Una tropa con CC alto es peligrosa en combate directo."
  },
  "CD": {
    nombre: "Combate a Distancia (CD)",
    desc: "Habilidad de combate con armas de fuego y a distancia. Se usa como base para disparar. Cuanto más alto, mejor la precisión. Todas las tiradas de disparo se hacen sobre este atributo, modificado por distancia, cobertura y otras condiciones."
  },
  "FIS": {
    nombre: "Físico (FIS)",
    desc: "Representa la resistencia física, agilidad y capacidades atléticas. Se usa para tiradas de Esquivar, superar obstaculos, resistir efectos físicos (como Granadas de Humo lanzadas mediante Ataque CD con FIS) y otras acciones que requieran esfuerzo corporal."
  },
  "VOL": {
    nombre: "Voluntad (VOL)",
    desc: "Fortaleza mental de la tropa. Se usa en tiradas de Coraje (Guts Rolls) para no retirarse bajo el fuego, y también para resistir efectos psicológicos como el Pulso Flash (aturdimiento). Un VOL alto indica una tropa disciplinada y con frialdad bajo presión."
  },
  "BLI": {
    nombre: "Blindaje (BLI)",
    desc: "Protección física de la tropa, ya sea por armadura, cobertura o equipamiento defensivo. Cuando recibe un impacto, la tropa hace una tirada de salvación contra este valor: si saca igual o menos, el impacto no causa herida. Cuanto mayor, más difícil de herir. BLI=0 significa sin armadura."
  },
  "PB": {
    nombre: "Protección Biotecnológica (PB)",
    desc: "Refleja la protección NBQ (Nuclear, Biológica, Química), Nanotecnológica, Electromagnética y contra Hackers de que dispone la Tropa. Se usa como Tirada de Salvación cuando el arma indica 'TS: PB' o 'TS: PB/2' (por ejemplo, munición Viral, ataques E/M, Programas de Hacker). Es un atributo independiente del BLI; se tira contra él en lugar de contra el BLI cuando la regla del arma lo indique."
  },
  "VITA": {
    nombre: "Puntos de Vida (VITA)",
    desc: "Número de heridas que puede aguantar la tropa antes de ser eliminada. VITA 1 significa que con un impacto sin salvar pasa a Inconsciente. VITA 2 significa que el primero la deja Herida (con penalizadores) y el segundo la deja Inconsciente. Una tropa Inconsciente puede ser rematada o estabilizada por un Sanitario."
  },
};

// ─── Equipment database ────────────────────────────────────────────────
const EQUIPMENT = {
  "Holomáscara": {
    tipo: "Equipo Automático · Opcional",
    desc: "Permite desplegar en estado HoloMáscara al situar la Tropa en la mesa de juego. En juego, permite el uso del estado HoloMáscara. Este estado permite hacerse pasar por otra Tropa u objeto del campo de batalla, engañando al adversario sobre la identidad o posición de la unidad."
  },
  "Visor X": {
    tipo: "Equipo Automático · Obligatorio",
    desc: "Modifica el valor de los MOD de Distancia del usuario: convierte el -3 en 0 y el -6 en -3, para cualquier Arma CD, Habilidad Especial o Equipo. También se aplica a Habilidades con rangos de Distancia que declare su usuario (por ejemplo: Descubrir o Fuego de Supresión). No afecta al humo ni a la visibilidad; sólo mejora los penalizadores por distancia."
  },

// ─── Render functions ─────────────────────────────────────────────────────────
function renderUnit(unit, idx) {
  const troopLabel = { IL: "Inf. Ligera", IM: "Inf. Media", IP: "Inf. Pesada", BAT: "Bat. Salto", WB: "Warbike" };

  const weaponTags = unit.armas.map(w =>
    `<span class="weapon-tag" data-weapon="${w}">${w}</span>`
  ).join(" ");

  const equipTags = unit.equipo.length
    ? `<div class="card-section">
        <div class="section-label">Equipo</div>
        <div class="equip-list">${unit.equipo.map(e => `<span class="equip-tag" data-equip="${e}">${e}</span>`).join("")}</div>
       </div>`
    : "";

  const skillTags = unit.habilidades.map(s =>
    `<span class="skill-tag" data-skill="${s}">${s}</span>`
  ).join("");

  // Vita boxes
  const vitaBoxes = Array.from({ length: unit.vita }, (_, i) =>
    `<div class="vita-box" data-unit="${idx}" data-box="${i}" title="Herida ${i + 1}"></div>`
  ).join("");

  return `
  <div class="unit-card troop-${unit.tipo}">
    <div class="card-header">
      <div>
        <div class="unit-name" data-img="${unit.img || ''}" data-label="${unit.nombre}" title="Ver miniatura">${unit.nombre}</div>
        <div class="unit-role">${unit.rol}</div>
      </div>
      <span class="troop-type-badge">${unit.tipo} · ${troopLabel[unit.tipo] || unit.tipo}</span>
    </div>

    <div class="stats-row">
      <div class="stat"><span class="stat-label" data-stat="MOV">MOV</span><span class="stat-value">${unit.mov}</span></div>
      <div class="stat highlight"><span class="stat-label" data-stat="CC">CC</span><span class="stat-value">${unit.cc}</span></div>
      <div class="stat highlight"><span class="stat-label" data-stat="CD">CD</span><span class="stat-value">${unit.cd}</span></div>
      <div class="stat"><span class="stat-label" data-stat="FIS">FIS</span><span class="stat-value">${unit.fis}</span></div>
      <div class="stat"><span class="stat-label" data-stat="VOL">VOL</span><span class="stat-value">${unit.vol}</span></div>
      <div class="stat"><span class="stat-label" data-stat="BLI">BLI</span><span class="stat-value">${unit.bli}</span></div>
      <div class="stat"><span class="stat-label" data-stat="PB">PB</span><span class="stat-value">${unit.pb}</span></div>
      <div class="stat"><span class="stat-label" data-stat="VITA">VITA</span><span class="stat-value">${unit.vita}</span></div>
    </div>

    <div class="card-section">
      <div class="section-label">Armamento</div>
      <div class="weapons-list">${weaponTags}</div>
    </div>

    ${equipTags}

    <div class="card-section">
      <div class="section-label">Habilidades Especiales</div>
      <div class="skills-list">${skillTags}</div>
    </div>

    <div class="card-section">
      <div class="section-label">Heridas</div>
      <div class="vita-tracker">
        ${vitaBoxes}
        <span class="vita-label">Activo</span>
      </div>
    </div>
  </div>`;
}

// ─── Prop/Mun render helpers ──────────────────────────────────────────────────
function findPropKey(token) {
  if (PROPERTIES[token]) return token;
  const base = token.replace(/\s*\(.*\)$/, '').trim();
  if (PROPERTIES[base]) return base;
  return null;
}

function renderPropTags(propsStr) {
  if (propsStr === "—") return "<span style='color:var(--text-dim)'>—</span>";
  return propsStr.split(" · ").map(token => {
    const key = findPropKey(token);
    if (key) return `<span class="prop-tag" data-prop="${key}">${token}</span>`;
    return `<span style="color:var(--text-dim)">${token}</span>`;
  }).join(" <span style='color:var(--text-dim);font-size:0.7em'>·</span> ");
}

function renderMunTag(mun) {
  if (mun === "—") return "<span style='color:var(--text-dim)'>—</span>";
  if (MUNITIONS[mun]) return `<span class="mun-tag" data-mun="${mun}">${mun}</span>`;
  // combined like DA+Shock — still make it clickable if we have it
  return `<span style="color:var(--text)">${mun}</span>`;
}

function renderWeaponTable() {
  const thead = `<thead><tr>
    <th>Nombre</th><th>PS</th><th>R</th><th>MUN.</th><th>TS: ATR</th><th>Propiedades</th><th>Rangos</th>
  </tr></thead>`;
  const rows = WEAPONS.map(w => `<tr>
    <td class="weapon-tag" style="cursor:pointer" data-weapon="${w.nombre}">${w.nombre}</td>
    <td>${w.ps}</td><td>${w.r}</td><td>${renderMunTag(w.mun)}</td><td>${w.ts}</td>
    <td>${renderPropTags(w.props)}</td><td style="white-space:nowrap;color:var(--text-dim)">${w.rangos}</td>
  </tr>`).join("");
  return `${thead}<tbody>${rows}</tbody>`;
}

// ─── Modal logic ──────────────────────────────────────────────────────────────
const overlay   = document.getElementById("modal-overlay");
const modalTitle = document.getElementById("modal-title");
const modalBody  = document.getElementById("modal-body");

function openModal(title, bodyHTML) {
  modalTitle.textContent = title;
  modalBody.innerHTML = bodyHTML;
  overlay.classList.add("open");
}

function closeModal() {
  overlay.classList.remove("open");
}

document.getElementById("modal-close").addEventListener("click", closeModal);
overlay.addEventListener("click", e => { if (e.target === overlay) closeModal(); });
document.addEventListener("keydown", e => { if (e.key === "Escape") closeModal(); });

document.addEventListener("click", e => {
  const tag = e.target.closest(".equip-tag");
  if (!tag) return;
  const name = tag.dataset.equip;
  const eq = EQUIPMENT[name];
  if (eq) {
    openModal(name, `<div class="meta">${eq.tipo}</div><p>${eq.desc}</p>`);
  } else {
    openModal(name, `<p style="color:var(--text-dim)">Descripción pendiente de añadir.</p>`);
  }
});

  const box = e.target.closest(".vita-box");
  if (!box) return;
  const tracker = box.parentElement;
  const boxes   = [...tracker.querySelectorAll(".vita-box")];
  const label   = tracker.querySelector(".vita-label");
  const idx     = boxes.indexOf(box);

  // Toggle: click same box again to unmark
  if (box.classList.contains("dead")) {
    boxes.forEach(b => b.classList.remove("used", "dead"));
    label.textContent = "Activo";
    return;
  }

  boxes.forEach((b, i) => {
    b.classList.remove("used", "dead");
    if (i < idx) b.classList.add("used");
    if (i === idx) b.classList.add("dead");
  });

  label.textContent = idx === boxes.length - 1 ? "¡Eliminado!" : `Herido (${idx + 1})`;
  label.style.color = idx === boxes.length - 1 ? "var(--red)" : "var(--accent)";
});
</script>
</body>
</html>
